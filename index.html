<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GitHub Issues Tracker - Login">
    <title>Login - GitHub Issues Tracker</title>
    <!-- Tailwind CSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-sm w-full max-w-md p-8 md:p-10 border border-gray-100">

        <!-- Logo & Header -->
        <div class="flex flex-col items-center mb-8">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mb-4">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">GitHub Issues Tracker</h1>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-5">
            <!-- Username Input -->
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <input type="text" id="username" placeholder="Enter Username"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF] outline-none transition-colors text-sm"
                    required>
                <p class="text-xs text-[#4A00FF] mt-2">Default: admin</p>
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter Password"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF] outline-none transition-colors text-sm"
                    required>
                <p class="text-xs text-[#4A00FF] mt-2">Default: admin123</p>
            </div>

            <!-- Error Message Container (Hidden by default) -->
            <div id="errorMessage" class="hidden text-red-500 text-sm font-medium text-center">
                Invalid credentials. Please try again.
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-[#4A00FF] hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors mt-2">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="bg-white px-2 text-gray-500">OR</span>
            </div>
        </div>

        <!-- Demo Credentials Box -->
        <div class="text-center">
            <p class="text-sm text-gray-500 mb-3">Demo Credentials:</p>
            <div class="bg-gray-50 rounded-xl py-4 border border-gray-100">
                <p class="text-sm text-gray-800 mb-1"><span class="font-semibold">Username:</span> admin</p>
                <p class="text-sm text-gray-800"><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>

    </div>

    <!-- External JS -->
    <script src="login.js"></script>
</body>

</html>

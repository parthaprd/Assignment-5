<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GitHub Issues Tracker - Track and manage your project issues efficiently">
    <title>GitHub Issues Tracker</title>
    <!-- Tailwind CSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-gray-50 min-h-screen" style="font-family: 'Inter', sans-serif;">

    <!-- navbar -->
    <nav class="navbar bg-white shadow-md px-4 md:px-8 lg:px-12 py-3 sticky top-0 z-50">
        <div class="navbar-start">
            <a class="flex items-center gap-2 cursor-pointer" href="#">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8 md:w-10 md:h-10">
                <span class="text-lg md:text-xl font-bold text-gray-800 hidden sm:inline">GitHub Issues Tracker</span>
            </a>
        </div>
        <div class="navbar-end gap-2">
            <div class="join">
                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="input input-bordered join-item input-sm md:input-md w-36 md:w-64 focus:outline-none"
                    onkeydown="if(event.key==='Enter') searchIssues()">
                <button onclick="searchIssues()" class="btn join-item btn-sm md:btn-md bg-[#4A00FF] text-white">
                    Search
                </button>
            </div>
        </div>
    </nav>

    <!-- all data of tab-->
    <main class="max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-10">

        <!-- Tabs Card -->
        <div class="bg-white rounded-2xl shadow-sm p-4 md:p-6 mb-4 md:mb-6">
            <div class="flex gap-2" role="tablist">
                <button id="tab-all" onclick="switchTab('all')"
                    class="tab-btn px-6 md:px-8 py-2.5 rounded-lg border-2 font-semibold text-sm md:text-base transition-all duration-200 bg-[#4A00FF] text-white border-transparent">
                    All
                </button>
                <button id="tab-open" onclick="switchTab('open')"
                    class="tab-btn px-6 md:px-8 py-2.5 rounded-lg border-2 border-gray-200 font-semibold text-sm md:text-base transition-all duration-200 text-gray-600 hover:bg-gray-100">
                    Open
                </button>
                <button id="tab-closed" onclick="switchTab('closed')"
                    class="tab-btn px-6 md:px-8 py-2.5 rounded-lg border-2 border-gray-200 font-semibold text-sm md:text-base transition-all duration-200 text-gray-600 hover:bg-gray-100">
                    Closed
                </button>
            </div>
        </div>

        <!-- Issues Content Card -->
        <div class="bg-white rounded-2xl shadow-sm p-4 md:p-8">

            <!-- Issue Count Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-3">
                <div class="flex items-center gap-3">
                    <img src="assets/Aperture.png" alt="Issues Icon" class="w-10 h-10">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">
                            <span id="issueCount">0</span> Issues
                        </h2>
                        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1.5">
                        <img src="assets/Open-Status.png" alt="Open Status" class="w-4 h-4">
                        <span class="text-sm font-medium text-gray-600">Open</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <img src="assets/Closed- Status .png" alt="Closed Status" class="w-4 h-4">
                        <span class="text-sm font-medium text-gray-600">Closed</span>
                    </div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="flex justify-center items-center py-20">
                <span class="loading loading-spinner loading-lg text-purple-600"></span>
            </div>

            <!-- Issue Cards Grid -->
            <div id="issueGrid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5 hidden">
            </div>

            <!-- No Results -->
            <div id="noResults" class="hidden text-center py-16">
                <p class="text-gray-400 text-lg font-medium">No issues found.</p>
            </div>

        </div>
    </main>

    <!-- ISSUE DETAIL MODAL -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box bg-white rounded-2xl p-6 md:p-8 relative max-w-[700px]">
            <!-- Loading state for modal -->
            <div id="modalLoading" class="flex justify-center items-center py-10">
                <span class="loading loading-spinner loading-lg text-purple-600"></span>
            </div>
            <!-- Modal Content -->
            <div id="modalContent" class="hidden">
                <h3 id="modalTitle" class="text-xl md:text-2xl font-bold text-gray-800 mb-3"></h3>

                <!-- Status & Author & Date -->
                <div class="flex flex-wrap items-center gap-2 mb-4">
                    <span id="modalStatus" class="badge text-white text-xs px-3 py-1"></span>
                    <span class="text-gray-400">•</span>
                    <span id="modalAuthor" class="text-sm text-gray-600"></span>
                    <span class="text-gray-400">•</span>
                    <span id="modalDate" class="text-sm text-gray-500"></span>
                </div>

                <!-- Labels -->
                <div id="modalLabels" class="flex flex-wrap gap-2 mb-5"></div>

                <!-- Description -->
                <p id="modalDescription" class="text-gray-600 text-sm leading-relaxed mb-6 border-b pb-5"></p>

                <!-- Assignee & Priority -->
                <div class="grid grid-cols-2 gap-4 bg-gray-50 rounded-xl p-4 mb-6">
                    <div>
                        <p class="text-gray-400 text-xs mb-1">Assignee:</p>
                        <p id="modalAssignee" class="font-semibold text-gray-700 text-sm"></p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs mb-1">Priority:</p>
                        <span id="modalPriority" class="badge text-white text-xs px-3 py-1"></span>
                    </div>
                </div>

                <!-- Close Button -->
                <div class="flex justify-end">
                    <button onclick="document.getElementById('issueModal').close()"
                        class="btn bg-[#4A00FF] text-white px-8">
                        Close
                    </button>
                </div>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <!-- External JS -->
    <script src="issue.js"></script>

</body>

</html>
